{% extends 'layout.html' %}

{% block page_body %}
<div class="container-xl">
    <!-- Сетка статистики -->
    <div class="row row-deck row-cards">
        <div class="col-sm-6 col-lg-3">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="subheader">Всего товаров</div>
                    </div>
                    <div class="h1 mb-3">{{ stats.products }}</div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-lg-3">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="subheader">Сотрудники</div>
                    </div>
                    <div class="h1 mb-3">{{ stats.employees }}</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Область управления конфигами -->
    <div class="row row-cards mt-3">
        <div class="col-12">
            <div class="card">
                <div class="card-header"><h3 class="card-title">Системные настройки</h3></div>
                <div class="table-responsive">
                    <table class="table card-table table-vcenter">
                        <thead><tr><th>Name</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody>
                            <!-- Это цикл по твоим конфигам -->
                            {% for conf in configs %}
                            <tr>
                                <td>{{ conf.name }}</td>
                                <td><span class="badge {{ 'bg-green' if conf.status else 'bg-red' }}">
                                    {{ 'Active' if conf.status else 'Inactive' }}
                                </span></td>
                                <td>
                                    <!-- AJAX или FORM для переключения -->
                                    <form method="POST" action="/admin/config/switch_status/{{ conf.id }}">
                                        <button type="submit" class="btn btn-sm btn-ghost-primary">Переключить</button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
